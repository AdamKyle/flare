name: PHPUnit Profile

on:
  workflow_dispatch:

jobs:
  phpunit-profile:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: flare_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: flare
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: flare_test
      DB_USERNAME: flare
      DB_PASSWORD: password
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      XDEBUG_MODE: profile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, bcmath, gd, intl, zip
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare profile directory
        run: |
          rm -rf storage/app/test-profile
          mkdir -p storage/app/test-profile/cachegrind

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear
          php artisan cache:clear

      - name: Enable MySQL slow query log
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL slow_query_log_file='/tmp/mysql-slow.log'; SET GLOBAL long_query_time=0; SET GLOBAL log_queries_not_using_indexes=ON; SET GLOBAL slow_query_log=ON;"

      - name: Run full PHPUnit suite with profiling
        continue-on-error: true
        run: |
          set +e
          /usr/bin/time -v php \
            -d memory_limit=-1 \
            -d max_execution_time=0 \
            -d xdebug.mode=profile \
            -d xdebug.start_with_request=yes \
            -d xdebug.output_dir="${{ github.workspace }}/storage/app/test-profile/cachegrind" \
            -d xdebug.profiler_output_name="cachegrind.out.%p" \
            vendor/bin/phpunit \
            --log-junit storage/app/test-profile/phpunit-junit.xml \
            2>&1 | tee storage/app/test-profile/phpunit-output.log
          echo "${PIPESTATUS[0]}" > storage/app/test-profile/phpunit-exit-code.txt
          exit 0

      - name: Disable MySQL slow query log
        continue-on-error: true
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL slow_query_log=OFF; SET GLOBAL long_query_time=10; SET GLOBAL log_queries_not_using_indexes=OFF;"

      - name: Copy MySQL slow query log
        continue-on-error: true
        run: |
          docker cp "$(docker ps --filter "ancestor=mysql:8.0" --format "{{.ID}}" | head -n 1)":/tmp/mysql-slow.log storage/app/test-profile/mysql-slow.log

      - name: Copy Laravel logs
        continue-on-error: true
        run: |
          cp storage/logs/laravel*.log storage/app/test-profile/ 2>/dev/null

      - name: Compress Xdebug cachegrind files
        continue-on-error: true
        run: |
          tar -czf storage/app/test-profile/cachegrind.tar.gz -C storage/app/test-profile/cachegrind .
          rm -rf storage/app/test-profile/cachegrind

      - name: Add profile file sizes
        continue-on-error: true
        run: |
          du -sh storage/app/test-profile/* 2>/dev/null | sort -h > storage/app/test-profile/profile-file-sizes.txt

      - name: Upload profile artifact
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-profile
          path: storage/app/test-profile
          retention-days: 7